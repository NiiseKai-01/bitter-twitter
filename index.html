<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <div class="page" >
        
        
        <div class="leftsidebar">
            <div class="side_options">
                <img src="src/X_logo_2023_(white).svg" id="X">
            </div>
            <div class="side_options">
                 <img src="src/X_logo_2023_(white).svg" class="icon">
                 <span>Home</span>
            </div>
            <div class="side_options">
                <img src="src/X_logo_2023_(white).svg" class="icon">
                <span>Explore</span>
            </div>
            <div class="side_options">
                 <img src="src/X_logo_2023_(white).svg" class="icon">
                 <span>Notifications</span>
            </div>
            <div class="side_options">
                 <img src="src/X_logo_2023_(white).svg" class="icon">
                 <span>Follow</span>
            </div>
            <div class="side_options">
                 <img src="src/X_logo_2023_(white).svg" class="icon">
                 <span>Chat</span>
            </div>
            <div class="side_options">
                <img src="src/X_logo_2023_(white).svg" class="icon">
                <span>Grok</span>
            </div>
            <div class="side_options">
                 <img src="src/X_logo_2023_(white).svg" class="icon">
                 <span>Premium</span>
            </div>
            <div class="side_options">
                 <img src="src/X_logo_2023_(white).svg" class="icon">
                 <span>Profile</span>
            </div>
            <div class="side_options">
                 <img src="src/X_logo_2023_(white).svg" class="icon">
                 <span>More</span>
            </div>
            <div class="side_options">
                <button id="post_btn">
                    <span id="post_btn_text">Post</span>
                </button>
            </div>
            <div class="side_options">
                <div class="profile"></div>
            </div>
        </div>
        
        
        <div class="feed">
            <div class="feed_tabs">
                <div class="Foryou">For You</div>
                <div class="Following">Following</div>
            </div>
            <div class="posts_space"></div>
            <div class="feed_space">
                <div class="feed_post">

                </div>
            </div>
        </div>
        
        
        <div class="rightsidebar">
            <input type="search" id="searchbar">
            <div class="premimum_ad"></div>
            <div class="newstd"></div>
            <div class="trending"></div>
            <div class="recommendations"></div>
        </div>
    
    
    </div>

</body>
</html>
